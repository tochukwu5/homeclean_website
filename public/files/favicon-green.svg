<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="gt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00897b"/>
      <stop offset="100%" stop-color="#00b496"/>
    </linearGradient>
    <linearGradient id="gm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <radialGradient id="gs" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e8f5e9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0"/>
    </radialGradient>
    <filter id="gg">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Top-bottom petals -->
  <polygon points="50,2 56,46 50,50 44,46" fill="url(#gd)"/>
  <polygon points="50,98 56,54 50,50 44,54" fill="url(#gd)"/>

  <!-- Left-right petals -->
  <polygon points="2,50 46,44 50,50 46,56" fill="url(#gt)"/>
  <polygon points="98,50 54,44 50,50 54,56" fill="url(#gt)"/>

  <!-- Diagonal petals -->
  <polygon points="81,19 54,46 50,50 55,54" fill="url(#gm)"/>
  <polygon points="19,19 46,46 50,50 45,54" fill="url(#gm)"/>
  <polygon points="81,81 54,54 50,50 45,54" fill="url(#gt)" opacity="0.85"/>
  <polygon points="19,81 46,54 50,50 55,54" fill="url(#gt)" opacity="0.85"/>

  <!-- Center glow -->
  <circle cx="50" cy="50" r="16" fill="url(#gs)" filter="url(#gg)"/>

  <!-- Sparkle lines -->
  <line x1="50" y1="36" x2="50" y2="64" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="36" y1="50" x2="64" y2="50" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="42" y1="42" x2="58" y2="58" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
  <line x1="58" y1="42" x2="42" y2="58" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
</svg>
