<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">

  <defs>

    <!-- TOP petal: dark green, lighter towards tip -->
    <linearGradient id="gTop" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#1a6b2a"/>
      <stop offset="60%"  stop-color="#2a8a38"/>
      <stop offset="100%" stop-color="#1d5c25"/>
    </linearGradient>

    <!-- BOTTOM petal: same dark green -->
    <linearGradient id="gBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a6b2a"/>
      <stop offset="60%"  stop-color="#2a8a38"/>
      <stop offset="100%" stop-color="#1d5c25"/>
    </linearGradient>

    <!-- LEFT petal: teal fading from center outward -->
    <linearGradient id="gLeft" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#009a8a"/>
      <stop offset="55%"  stop-color="#00b8a4"/>
      <stop offset="100%" stop-color="#0099a0"/>
    </linearGradient>

    <!-- RIGHT petal: teal -->
    <linearGradient id="gRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#009a8a"/>
      <stop offset="55%"  stop-color="#00b8a4"/>
      <stop offset="100%" stop-color="#0099a0"/>
    </linearGradient>

    <!-- TOP-RIGHT diagonal: medium green -->
    <linearGradient id="gTR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a7030"/>
      <stop offset="100%" stop-color="#2d9040"/>
    </linearGradient>

    <!-- TOP-LEFT diagonal: medium green -->
    <linearGradient id="gTL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a7030"/>
      <stop offset="100%" stop-color="#2d9040"/>
    </linearGradient>

    <!-- BOTTOM-RIGHT diagonal: teal-green blend -->
    <linearGradient id="gBR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#008a7a"/>
      <stop offset="100%" stop-color="#00a890"/>
    </linearGradient>

    <!-- BOTTOM-LEFT diagonal: teal-green blend -->
    <linearGradient id="gBL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#008a7a"/>
      <stop offset="100%" stop-color="#00a890"/>
    </linearGradient>

    <!-- Sparkle center radial: white hot core fading out -->
    <radialGradient id="gSparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="15%"  stop-color="#edfaf5" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#c8f0e0" stop-opacity="0.85"/>
      <stop offset="65%"  stop-color="#80d8b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#009a8a"  stop-opacity="0"/>
    </radialGradient>

    <!-- Soft outer glow filter -->
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Center sparkle glow filter -->
    <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ════════════════════════════════════
       STAR centered at (250, 250)
       Long petals reach to edge: ±240px
       Short (wide) petal base: ±18px
  ════════════════════════════════════ -->

  <!-- TOP petal -->
  <polygon
    points="250,10  268,238  250,250  232,238"
    fill="url(#gTop)"
  />

  <!-- BOTTOM petal -->
  <polygon
    points="250,490  268,262  250,250  232,262"
    fill="url(#gBot)"
  />

  <!-- LEFT petal -->
  <polygon
    points="10,250  238,232  250,250  238,268"
    fill="url(#gLeft)"
  />

  <!-- RIGHT petal -->
  <polygon
    points="490,250  262,232  250,250  262,268"
    fill="url(#gRight)"
  />

  <!-- TOP-RIGHT diagonal petal -->
  <polygon
    points="420,80   262,238  250,250  262,262"
    fill="url(#gTR)"
  />

  <!-- TOP-LEFT diagonal petal -->
  <polygon
    points="80,80    238,238  250,250  238,262"
    fill="url(#gTL)"
  />

  <!-- BOTTOM-RIGHT diagonal petal -->
  <polygon
    points="420,420  262,262  250,250  238,262"
    fill="url(#gBR)"
  />

  <!-- BOTTOM-LEFT diagonal petal -->
  <polygon
    points="80,420   238,262  250,250  262,262"
    fill="url(#gBL)"
  />

  <!-- Center sparkle halo -->
  <circle
    cx="250" cy="250" r="55"
    fill="url(#gSparkle)"
    filter="url(#sparkleGlow)"
  />

  <!-- Bright white sparkle rays: vertical -->
  <line x1="250" y1="210" x2="250" y2="290"
        stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.98"/>
  <!-- Horizontal -->
  <line x1="210" y1="250" x2="290" y2="250"
        stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.98"/>
  <!-- Diagonal NW-SE -->
  <line x1="222" y1="222" x2="278" y2="278"
        stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <!-- Diagonal NE-SW -->
  <line x1="278" y1="222" x2="222" y2="278"
        stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>

  <!-- Tiny hot-white core dot -->
  <circle cx="250" cy="250" r="7"
          fill="white" opacity="0.95" filter="url(#sparkleGlow)"/>

</svg>
