<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <!-- Green star gradient - outer petals -->
    <linearGradient id="greenDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <!-- Light green side petals -->
    <linearGradient id="greenSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00897b"/>
      <stop offset="100%" stop-color="#00b496"/>
    </linearGradient>
    <!-- Medium green petals -->
    <linearGradient id="greenMed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <!-- Sparkle glow -->
    <radialGradient id="sparkleGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#e8f5e9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowG">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── 8-pointed star centered at (50, 50) ── -->

  <!-- Top-bottom long petals (deep green) -->
  <polygon points="50,4 55,48 50,50 45,48" fill="url(#greenDeep)"/>
  <polygon points="50,96 55,52 50,50 45,52" fill="url(#greenDeep)"/>

  <!-- Left-right long petals (teal-green) -->
  <polygon points="4,50 48,45 50,50 48,55" fill="url(#greenSide)"/>
  <polygon points="96,50 52,45 50,50 52,55" fill="url(#greenSide)"/>

  <!-- Diagonal petals -->
  <polygon points="79,21 53,46 50,50 54,53" fill="url(#greenMed)"/>
  <polygon points="21,21 47,46 50,50 46,53" fill="url(#greenMed)"/>
  <polygon points="79,79 53,54 50,50 46,53" fill="url(#greenSide)" opacity="0.85"/>
  <polygon points="21,79 47,54 50,50 54,53" fill="url(#greenSide)" opacity="0.85"/>

  <!-- Inner star body -->
  <circle cx="50" cy="50" r="10" fill="url(#greenMed)" opacity="0.6"/>

  <!-- Sparkle center -->
  <circle cx="50" cy="50" r="14" fill="url(#sparkleGreen)" filter="url(#glowG)"/>

  <!-- Sparkle cross lines -->
  <line x1="50" y1="40" x2="50" y2="60" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="40" y1="50" x2="60" y2="50" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="44" y1="44" x2="56" y2="56" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="56" y1="44" x2="44" y2="56" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

  <!-- ── Text ── -->
  <text
    x="112"
    y="44"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#1b5e20"
    letter-spacing="0.5"
  >Perth</text>

  <text
    x="112"
    y="74"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#00897b"
    letter-spacing="0.5"
  >Kleeners</text>
</svg>
